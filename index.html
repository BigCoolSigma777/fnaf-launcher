<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNaF Web Hub</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: black; color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Дисклеймер */
        #warning-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 100; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; cursor: pointer; padding: 20px;
        }

        .warning-text { color: red; font-weight: bold; border: 2px solid red; padding: 20px; max-width: 500px; }

        .static {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://giphy.com');
            opacity: 0.05; z-index: -1; pointer-events: none;
        }

        h1 { font-size: 2.2rem; text-shadow: 2px 2px 10px red; text-align: center; }
        
        /* Кнопки с картинками */
        .menu-container { display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 400px; }
        
        .menu-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333; color: white;
            padding: 10px 15px; font-size: 1.1rem;
            text-decoration: none; display: flex; align-items: center;
            transition: 0.2s; cursor: pointer;
        }

        .menu-btn img {
            width: 50px; height: 50px; margin-right: 15px;
            border-radius: 5px; filter: grayscale(100%); transition: 0.3s;
        }

        .menu-btn:hover {
            border-color: white; background: rgba(255, 255, 255, 0.1);
            padding-left: 25px;
        }

        .menu-btn:hover img { filter: grayscale(0%); transform: scale(1.1); }

        /* Пасхалка с Золотым Фредди */
        #golden-freddy {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://imgur.com') center/cover; z-index: 200;
        }

        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch {
            2% { transform: translate(2px,0); }
            4% { transform: translate(-2px,0); }
        }
    </style>
</head>
<body>

    <!-- Экран предупреждения -->
    <div id="warning-screen" onclick="this.style.display='none'">
        <div class="warning-text">
            <h1>WARNING!</h1>
            <p>Эта игра содержит мигающие огни, громкие звуки и множество скримеров!</p>
            <p style="font-size: 0.8rem; color: white;">[ НАЖМИ В ЛЮБОЕ МЕСТО, ЧТОБЫ ПРОДОЛЖИТЬ ]</p>
        </div>
    </div>

    <div id="golden-freddy"></div>
    <div class="static"></div>

    <h1 class="glitch">FIVE NIGHTS AT FREDDY'S<br>
    <small id="easter-egg-trigger" style="font-size: 0.9rem; color: #444; cursor: default;">COLLECTION</small></h1>

    <div class="menu-container">
        <a href="ССЫЛКА_НА_ФНАФ_1" class="menu-btn">
            <img src="https://imgur.com" alt="FNaF1"> 
            <span>START NIGHT 1</span>
        </a>
        <a href="ССЫЛКА_НА_ФНАФ_2" class="menu-btn">
            <img src="https://imgur.com" alt="FNaF2"> 
            <span>START NIGHT 2</span>
        </a>
        <a href="ССЫЛКА_НА_ФНАФ_3" class="menu-btn">
            <img src="https://imgur.com" alt="FNaF3"> 
            <span>START NIGHT 3</span>
        </a>
    </div>

    <script>
        // Пасхалка: Кликни 5 раз на "COLLECTION"
        let clicks = 0;
        document.getElementById('easter-egg-trigger').onclick = function() {
            clicks++;
            if (clicks === 5) {
                document.getElementById('golden-freddy').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('golden-freddy').style.display = 'none';
                    clicks = 0;
                }, 500);
            }
        };

        let tg = window.Telegram.WebApp;
        tg.expand();
    </script>
</body>
</html>
