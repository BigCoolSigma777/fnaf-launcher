<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNaF Hub - Fazbear Entertainment</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #050505; color: #eee;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- EFFECTS --- */
        .static {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://giphy.com');
            opacity: 0.05; z-index: 10; pointer-events: none;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; z-index: 11; pointer-events: none;
        }

        /* --- BACKGROUND SILHOUETTE --- */
        .silhouette {
            position: fixed; bottom: 0; right: 10%; width: 300px; height: 450px;
            background: url('https://imgur.com') no-repeat bottom;
            background-size: contain; opacity: 0.15; z-index: 1; filter: brightness(0);
        }

        .eyes {
            position: absolute; top: 22%; left: 45%; width: 40px; height: 10px;
            display: flex; justify-content: space-between;
        }

        .eye {
            width: 8px; height: 8px; background: red; border-radius: 50%;
            box-shadow: 0 0 15px red, 0 0 5px white; animation: blink 4s infinite;
        }

        @keyframes blink { 0%, 90%, 100% { opacity: 1; } 92%, 98% { opacity: 0; } }

        /* --- WARNING --- */
        #warning-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 100; display: flex; align-items: center; justify-content: center;
            text-align: center; cursor: pointer;
        }

        .warning-box { color: #cc0000; border: 1px solid #cc0000; padding: 30px; letter-spacing: 2px; }

        /* --- UI ELEMENTS --- */
        h1 { font-size: 1.5rem; text-shadow: 0 0 10px red; z-index: 20; letter-spacing: 5px; }

        .menu-container { display: flex; flex-direction: column; gap: 20px; width: 85%; max-width: 450px; z-index: 20; }

        .menu-btn {
            background: rgba(20, 20, 20, 0.8); border: 1px solid #333;
            color: #aaa; text-decoration: none; display: flex; align-items: center;
            padding: 15px; transition: 0.4s; position: relative; overflow: hidden;
        }

        .menu-btn img {
            width: 80px; height: 80px; margin-right: 20px;
            border: 1px solid #222; filter: grayscale(1) contrast(1.2); transition: 0.4s;
        }

        .menu-btn:hover {
            border-color: #fff; color: #fff; background: rgba(40, 40, 40, 0.9);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.1);
        }

        .menu-btn:hover img { filter: grayscale(0); border-color: #fff; }

        /* --- SETTINGS OVERLAY --- */
        #settings-menu {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 50; flex-direction: column; align-items: center; justify-content: center;
        }

        .setting-row { margin: 20px; width: 250px; display: flex; justify-content: space-between; }

        input[type=range] { cursor: pointer; accent-color: red; }

        .close-btn { margin-top: 30px; color: red; cursor: pointer; border-bottom: 1px solid red; }

        .glitch-anim { animation: glitch 3s infinite; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.8; } 52% { opacity: 1; } 100% { opacity: 1; } }

    </style>
</head>
<body>

    <div id="warning-screen" onclick="this.style.display='none'">
        <div class="warning-box">
            <h1>WARNING</h1>
            <p>FLASHING LIGHTS. LOUD NOISES. JUMPSCARES.</p>
            <p style="font-size: 0.7rem; color: #444; margin-top: 40px;">CLICK TO INITIATE SYSTEM</p>
        </div>
    </div>

    <div class="static"></div>
    <div class="scanlines"></div>
    
    <div class="silhouette">
        <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
    </div>

    <h1 class="glitch-anim">FAZBEAR ENTERTAINMENT</h1>

    <div class="menu-container">
        <a href="https://github.io" target="_top" class="menu-btn">
            <img src="https://imgur.com" alt="FNaF1">
            <div>
                <b style="font-size: 1.2rem;">FNaF 1</b><br>
                <small style="color: #666;">Circa 1993</small>
            </div>
        </a>

        <a href="https://github.io" target="_top" class="menu-btn">
            <img src="https://imgur.com" alt="FNaF2">
            <div>
                <b style="font-size: 1.2rem;">FNaF 2</b><br>
                <small style="color: #666;">The Grand Re-opening</small>
            </div>
        </a>

        <a href="https://github.io" target="_top" class="menu-btn">
            <img src="https://imgur.com" alt="FNaF3">
            <div>
                <b style="font-size: 1.2rem;">FNaF 3</b><br>
                <small style="color: #666;">30 Years Later</small>
            </div>
        </a>

        <div class="menu-btn" onclick="document.getElementById('settings-menu').style.display='flex'">
            <div style="width: 80px; text-align: center; font-size: 2rem;">⚙</div>
            <div>
                <b style="font-size: 1.2rem;">SETTINGS</b><br>
                <small style="color: #666;">System Configuration</small>
            </div>
        </div>
    </div>

    <div id="settings-menu">
        <h1>SYSTEM CONFIG</h1>
        <div class="setting-row">
            <span>VOLUME</span>
            <input type="range" min="0" max="100" value="80">
        </div>
        <div class="setting-row">
            <span>STATIC</span>
            <input type="range" min="0" max="100" value="20">
        </div>
        <div class="setting-row">
            <span>V-SYNC</span>
            <input type="checkbox" checked>
        </div>
        <div class="close-btn" onclick="document.getElementById('settings-menu').style.display='none'">BACK TO MENU</div>
    </div>

    <script src="https://telegram.org"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
