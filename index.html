<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNaF Web Hub</title>
    <style>
        /* Стиль в духе FNaF */
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Эффект телевизионных помех на фоне */
        .static {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://giphy.com');
            opacity: 0.05;
            z-index: -1;
            pointer-events: none;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 2px 2px 10px red;
            margin-bottom: 50px;
            text-align: center;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80%;
            max-width: 400px;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid white;
            color: white;
            padding: 15px;
            font-size: 1.2rem;
            text-align: left;
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
            text-transform: uppercase;
        }

        .menu-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px white;
            padding-left: 30px;
        }

        .glitch {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }
    </style>
</head>
<body>

    <div class="static"></div>

    <h1 class="glitch">FIVE NIGHTS AT FREDDY'S<br><small style="font-size: 1rem; color: #555;">COLLECTION</small></h1>

    <div class="menu-container">
        <!-- Замените ссылки ниже на реальные ссылки игр из GitHub -->
        <a href="https://github.io" class="menu-btn">>> Play FNaF 1</a>
        <a href="https://github.io" class="menu-btn">>> Play FNaF 2</a>
        <a href="https://github.io" class="menu-btn">>> Play FNaF 3</a>
        <a href="#" class="menu-btn" style="color: #444; border-color: #444;">>> Settings (Soon)</a>
    </div>

    <script>
        // Скрипт для корректной работы внутри Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачивает окно на весь экран
    </script>
    <script src="https://telegram.org"></script>
</body>
</html>
