<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FNaF Hub - Database</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #010101; color: #eee;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* --- BACKGROUND FREDDY (MOVED TO RIGHT) --- */
        .freddy-container {
            position: fixed; bottom: 0; right: -5%; /* Сдвинут вправо */
            width: 70vh; height: 90vh;
            z-index: 1; pointer-events: none;
            animation: twitch 4s infinite;
        }
        .freddy-bg {
            width: 100%; height: 100%;
            background: url('https://imgur.com') no-repeat bottom right;
            background-size: contain; opacity: 0.12; /* Чуть ярче */
            filter: brightness(0.6);
        }
        .freddy-eyes {
            position: absolute; top: 32%; right: 42%;
            display: flex; justify-content: space-between; width: 90px;
        }
        .eye-dot {
            width: 5px; height: 5px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #fff; opacity: 0.6;
        }

        @keyframes twitch {
            0%, 92% { transform: translate(0,0); }
            93% { transform: translate(5px, -3px); }
            95% { transform: translate(-3px, 5px); }
            96% { transform: translate(0,0); }
        }

        /* --- EFFECTS --- */
        .static-noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://giphy.com'); opacity: 0.06; z-index: 99; pointer-events: none; mix-blend-mode: screen; }
        .crt-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%); background-size: 100% 3px; z-index: 100; pointer-events: none; }

        /* --- WARNING --- */
        #warning-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 999; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* --- MENU (MOVED TO LEFT) --- */
        #main-title { font-size: 1.2rem; letter-spacing: 5px; color: #444; margin: 20px 40px; z-index: 20; text-align: left; }
        
        .scroll-container { 
            width: 100%; overflow-y: auto; 
            padding-left: 30px; /* Отступ слева */
            z-index: 20; padding-bottom: 100px;
        }
        
        .menu-container { 
            display: flex; flex-direction: column; gap: 20px; 
            width: 60%; /* Занимает левую часть */
            max-width: 500px; 
        }

        /* BIGGER JITTERING FRAMES */
        .menu-btn {
            background: rgba(5, 5, 5, 0.8); border: 1px solid #222;
            color: #888; text-decoration: none; display: flex; align-items: center;
            padding: 15px; transition: 0.3s;
            height: 120px; /* Рамки стали больше */
            animation: frameJitter 5s infinite;
        }

        @keyframes frameJitter {
            0%, 98% { border-color: #222; transform: translateX(0); }
            98.5% { border-color: #555; transform: translateX(2px); }
            99% { border-color: #111; transform: translateX(-2px); }
        }

        .icon-wrapper { 
            width: 100px; height: 100%; /* Постеры теперь большие */
            margin-right: 25px; flex-shrink: 0; background: #000; overflow: hidden;
            border: 1px solid #333;
        }
        .menu-btn img { width: 100%; height: 100%; filter: grayscale(1); object-fit: cover; transition: 0.4s; }
        
        .menu-btn:hover { border-color: #fff; color: #fff; background: #111; padding-left: 25px; }
        .menu-btn:hover img { filter: grayscale(0) brightness(1.1); }

        #settings-trigger { position: fixed; bottom: 30px; right: 30px; font-size: 50px; cursor: pointer; color: #222; z-index: 110; }
    </style>
</head>
<body>

    <div id="warning-screen" onclick="startSystem()">
        <div style="color:red; border: 2px solid red; padding: 40px; text-align: center;">
            <h1 style="font-size: 3rem;">WARNING</h1>
            <p>[ CLICK TO START SESSION ]</p>
        </div>
    </div>

    <div class="static-noise"></div>
    <div class="crt-overlay"></div>

    <audio id="pc-hum" loop><source src="https://soundjay.com" type="audio/mpeg"></audio>
    <audio id="bg-music" loop><source src="https://soundjay.com" type="audio/mpeg"></audio>

    <!-- Freddy Background (RIGHT SIDE) -->
    <div class="freddy-container">
        <div class="freddy-bg"></div>
        <div class="freddy-eyes"><div class="eye-dot"></div><div class="eye-dot"></div></div>
    </div>

    <div id="settings-trigger">⚙</div>
    <h1 id="main-title">FAZBEAR_DATABASE_v1.7</h1>

    <div class="scroll-container">
        <div class="menu-container">
            <!-- Пример кнопки. Когда создашь папку, замени путь в src на "assets/fnaf1.jpg" -->
            <a href="https://github.io" target="_blank" class="menu-btn">
                <div class="icon-wrapper"><img src="https://imgur.com"></div>
                <div><b style="font-size: 1.5rem;">FNaF 1</b><br><small>The classic shift.</small></div>
            </a>
            
            <a href="https://github.io" target="_blank" class="menu-btn">
                <div class="icon-wrapper"><img src="https://imgur.com"></div>
                <div><b style="font-size: 1.5rem;">FNaF 2</b><br><small>New faces, no doors.</small></div>
            </a>

            <a href="https://github.io" target="_blank" class="menu-btn">
                <div class="icon-wrapper"><img src="https://imgur.com"></div>
                <div><b style="font-size: 1.5rem;">FNaF 3</b><br><small>The horror attraction.</small></div>
            </a>

            <a href="https://mit.edu" target="_blank" class="menu-btn">
                <div class="icon-wrapper"><img src="https://imgur.com"></div>
                <div><b style="font-size: 1.5rem;">FNaF 4</b><br><small>Final chapter at home.</small></div>
            </a>
            <!-- Добавь остальные кнопки по этому же шаблону -->
        </div>
    </div>

    <script>
        function startSystem() {
            document.getElementById('warning-screen').style.display = 'none';
            document.getElementById('pc-hum').volume = 0.2;
            document.getElementById('bg-music').volume = 0.3;
            document.getElementById('pc-hum').play();
            document.getElementById('bg-music').play();
        }
    </script>
</body>
</html>
