<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNaF Web Hub</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: black; color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Экран предупреждения */
        #warning-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 100; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; cursor: pointer; padding: 20px;
        }

        .warning-text { 
            color: red; font-weight: bold; border: 2px solid red; 
            padding: 20px; max-width: 500px; 
            box-shadow: 0 0 15px red;
        }

        /* Помехи на фоне */
        .static {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://giphy.com');
            opacity: 0.08; z-index: -1; pointer-events: none;
        }

        h1 { font-size: 1.8rem; text-shadow: 2px 2px 10px red; text-align: center; margin-bottom: 30px; text-transform: uppercase; }
        
        .menu-container { display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 350px; }
        
        /* Кнопки игр */
        .menu-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #444; color: white;
            padding: 12px; font-size: 1rem;
            text-decoration: none; display: flex; align-items: center;
            transition: 0.2s; cursor: pointer;
        }

        .menu-btn img {
            width: 50px; height: 50px; margin-right: 15px;
            border-radius: 4px; filter: grayscale(100%); transition: 0.3s;
            object-fit: cover;
        }

        .menu-btn:hover {
            border-color: #fff; background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        .menu-btn:hover img { filter: grayscale(0%); }

        /* Золотой Фредди (Пасхалка) */
        #golden-freddy {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://imgur.com') center/cover; z-index: 200;
        }

        .glitch { animation: glitch 2s linear infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            1% { transform: translate(2px, 1px); }
            2% { transform: translate(-2px, -1px); }
            3% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <!-- Дисклеймер (закроется при клике) -->
    <div id="warning-screen" onclick="this.style.display='none'">
        <div class="warning-text">
            <h1>ВНИМАНИЕ!</h1>
            <p>Эта игра содержит резкие звуки, мигающий свет и скримеры.</p>
            <p style="font-size: 0.8rem; color: white; margin-top: 20px;">[ НАЖМИ, ЧТОБЫ ПРОДОЛЖИТЬ ]</p>
        </div>
    </div>

    <div id="golden-freddy"></div>
    <div class="static"></div>

    <h1 class="glitch">FNAF COLLECTION<br>
    <small id="easter-egg-trigger" style="font-size: 0.8rem; color: #333;">v.1.0</small></h1>

    <div class="menu-container">
        <!-- Атрибут target="_top" помогает обойти блокировку переходов внутри Telegram -->
        <a href="https://github.io" target="_top" class="menu-btn">
            <img src="https://imgur.com" alt="FNaF1"> 
            <span>ИГРАТЬ В FNAF 1</span>
        </a>
        <a href="https://github.io" target="_top" class="menu-btn">
            <img src="https://imgur.com" alt="FNaF2"> 
            <span>ИГРАТЬ В FNAF 2</span>
        </a>
        <a href="https://github.io" target="_top" class="menu-btn">
            <img src="https://imgur.com" alt="FNaF3"> 
            <span>ИГРАТЬ В FNAF 3</span>
        </a>
    </div>

    <!-- Скрипт Telegram -->
    <script src="https://telegram.org"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // Пасхалка: 5 быстрых кликов по тексту "v.1.0"
        let clicks = 0;
        document.getElementById('easter-egg-trigger').onclick = function() {
            clicks++;
            if (clicks === 5) {
                document.getElementById('golden-freddy').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('golden-freddy').style.display = 'none';
                    clicks = 0;
                }, 500);
            }
        };
    </script>
</body>
</html>
